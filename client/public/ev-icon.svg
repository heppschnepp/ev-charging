<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" width="260" height="260" role="img">
  <title>EV Charge app icon</title>
  <desc>iOS-style app icon for an EV charging app for iPhone 16e</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#0f1f2e"/>
      <stop offset="100%" stop-color="#071018"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#4fffb0"/>
      <stop offset="100%" stop-color="#00c96e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2aff8a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00a855" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="plug" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8fce8"/>
      <stop offset="100%" stop-color="#7de8b4"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="260" height="260" rx="58"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="260" height="260" rx="58" fill="url(#bg)"/>

  <circle cx="130" cy="130" r="88" fill="none" stroke="url(#ring)" stroke-width="1"/>
  <circle cx="130" cy="130" r="70" fill="none" stroke="#1aff7a" stroke-width="0.5" stroke-opacity="0.15"/>
  <circle cx="130" cy="130" r="54" fill="#0e2a1a" fill-opacity="0.6"/>

  <polygon points="142,76 112,132 132,132 118,184 158,120 136,120" fill="url(#bolt)"/>

  <rect x="71" y="89" width="10" height="22" rx="5" fill="url(#plug)"/>
  <rect x="179" y="89" width="10" height="22" rx="5" fill="url(#plug)"/>

  <rect x="67" y="107" width="18" height="36" rx="9" fill="#1e4432"/>
  <rect x="68" y="108" width="16" height="34" rx="8" fill="none" stroke="#3aff90" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="71" y="111" width="10" height="8" rx="4" fill="#2aff8a" fill-opacity="0.5"/>

  <rect x="175" y="107" width="18" height="36" rx="9" fill="#1e4432"/>
  <rect x="176" y="108" width="16" height="34" rx="8" fill="none" stroke="#3aff90" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="179" y="111" width="10" height="8" rx="4" fill="#2aff8a" fill-opacity="0.5"/>

  <line x1="85" y1="125" x2="76" y2="125" stroke="#2aff8a" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="175" y1="125" x2="184" y2="125" stroke="#2aff8a" stroke-width="1.5" stroke-opacity="0.6"/>

  <rect x="0" y="0" width="260" height="260" rx="58" fill="none" stroke="#1aff7a" stroke-width="0.75" stroke-opacity="0.18"/>
